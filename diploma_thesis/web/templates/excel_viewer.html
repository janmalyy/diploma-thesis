<!DOCTYPE html>
<html>
<head>
  <title>Excel Viewer and Editor</title>
  <link rel="icon" type="image/png" sizes="64x64" href="../static/favicon_64x64.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
  <script type="module" src="/static/utils.js"></script>
  <script type="module" src="/static/excel_app.js"></script>
  <style>
    #hot-container {
      height: 600px;
      overflow: hidden;
      margin-top: 20px;
      margin-bottom: 20px;
    }
    #hot-container .first-row-bold {
      /* Use !important as a last resort to beat high-specificity library styles */
      font-weight: bold !important;
      background-color: #e0e0e0 !important;
    }
    .file-actions {
      margin-bottom: 20px;
    }
    .alert {
      display: none;
      margin-top: 10px;
    }
    .nav-tabs {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container mt-4">
    <ul class="nav nav-tabs">
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="/excel">Excel Viewer</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/variant">Variant Summary</a>
      </li>
    </ul>

    <h2>Excel Viewer and Editor</h2>

    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">
            <h5>Upload Excel File</h5>
          </div>
          <div class="card-body">
            <form id="upload-form" enctype="multipart/form-data">
              <div class="mb-3">
                <input class="form-control" type="file" id="file-input" accept=".xlsx">
                <div class="form-text">Only .xlsx files are supported</div>
              </div>
              <button type="submit" class="btn btn-primary">Upload</button>
            </form>
            <div class="alert alert-danger" id="error-message"></div>
            <div class="alert alert-success" id="success-message"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="editor-container" style="display: none;">
      <div class="row mt-4">
        <div class="col-md-12">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h5 id="current-file">Current File: <span></span></h5>
              <div class="file-actions">
                <button id="export-xlsx" class="btn btn-success">Export as XLSX</button>
                <button id="export-csv" class="btn btn-info">Export as CSV</button>
              </div>
            </div>
            <div class="card-body">
              <div id="hot-container"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal fade" id="confirmOverwriteModal" tabindex="-1" aria-labelledby="confirmOverwriteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmOverwriteModalLabel">Confirm File Overwrite</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          A file is already loaded. Do you want to overwrite it with the new file?
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="confirmOverwrite">Overwrite</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LLM Summary Modal -->
  <div class="modal fade" id="summaryModal" tabindex="-1" aria-labelledby="summaryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="summaryModalLabel">LLM Summary</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="summaryModalBody" style="white-space: pre-wrap;"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
